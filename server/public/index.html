<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Koalla Holla</title>
    <link rel="stylesheet" href="views/styles.css">
    <script defer src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script> 
    <script defer src="scripts/client.js" charset="utf-8"></script>
  </head>
  <body>
    <header>
      <img src="images/icon.png" class="icon" />
      <h1>Koala Holla</h1>
      <h3>1976 Llama Comma Drive</h2>
      <h3>Walla Walla, WA</h2>
    </header>
    <section id="addKoala">
      <h2>Add Koala</h2>
      <input type="text" id="nameIn" placeholder="Name">
      <input type="number" id="ageIn"  placeholder="Age">
      <input type="text" id="colorIn"  placeholder="Favorite Color">
      <input type="text" id="readyForTransferIn" placeholder="Transfer(t/f)">
      <input type="text" id="notesIn" placeholder="Notes">
      <button type="button" id="addButton" value="Add Data" onClick="addKoala()">Add Koala</button>
    </section>
    <section>
      <h2>All Koalas</h2>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Favorite Color</th>
            <th>Ready for Transfer</th>
            <th>Notes</th>
            <th>Mark Ready</th>
            <th>Remove</th>
          </tr>
        </thead>
        <tbody id="viewKoalas">
          <tr>
            <td>Koala Test</td>
            <td>13</td>
            <td>Brown</td>
            <td>True</td>
            <td>Likes apples</td>


          </tr>

          </tr>
        </tbody>
      </table>
    </section>
  </body>
</html>
